apiVersion: apps/v1
kind: Deployment
metadata:
  name: slink-server
  namespace: slink
  labels:
    app: slink-server
    version: v0.6
spec:
  # Phase 1 = 1 副本验证镜像 + 后端连通性
  # Phase 2 = 解决三连锁后扩到 3
  # Day 27 Phase 2 P1：scale=2 验证跨 Pod L1 一致性
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: slink-server
  template:
    metadata:
      labels:
        app: slink-server
        version: v0.6
    spec:
      # Phase 4 优雅停机 S5：drain 25s in-flight + Kafka flush，留 5s buffer
      terminationGracePeriodSeconds: 30
      containers:
        - name: slink-server
          image: slink-server:v0.6
          # kind load docker-image 后本地有，不需要 pull
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 18080
              protocol: TCP
            - name: pprof
              containerPort: 6060
              protocol: TCP

          env:
            # ── 基础 ──
            - name: SLINK_ADDR
              value: ":18080"
            - name: SLINK_PPROF_ADDR
              # Pod 内 pprof 绑 0.0.0.0 才能从 service / kubectl port-forward 访问
              # （host 模式默认 127.0.0.1:6060 是 v0.3 hardening 防 SSRF 的）
              value: "0.0.0.0:6060"
            - name: SLINK_BASE_URL
              value: "http://localhost:18080"
            - name: SLINK_LOG_LEVEL
              value: "info"
            - name: SLINK_ENV
              value: "dev"

            # ── PG ──（连到 host docker compose 的 :15432）
            - name: SLINK_PG_DSN
              value: "postgres://slink:slink@pg:15432/slink?sslmode=disable"
            - name: SLINK_PG_MAX_CONNS
              value: "20"
            - name: SLINK_PG_MIN_CONNS
              value: "2"

            # ── Redis ──（host :16379）
            - name: SLINK_REDIS_ADDR
              value: "redis:16379"
            - name: SLINK_REDIS_DB
              value: "0"

            # ── ID 号段（Day 27 Phase 2 §8.1 切 Redis INCRBY，多 Pod 强制要求）──
            - name: SLINK_ID_STEP_SIZE
              value: "1000"
            - name: SLINK_ID_BIZ_TAG
              value: "link"
            - name: SLINK_ID_SOURCE
              value: "redis"

            # ── L1 cache ──
            - name: SLINK_LOCAL_CACHE_SIZE
              value: "4096"
            - name: SLINK_LOCAL_CACHE_TTL
              value: "1m"

            # ── Kafka ──（Day 28 修：走 EXTERNAL_K8S listener，advertised = host.docker.internal:19093）
            # 原 :19092 advertised localhost:19092，Pod 内 localhost ≠ host 导致 acked=0
            - name: SLINK_EVENT_BACKEND
              value: "kafka"
            - name: SLINK_KAFKA_BROKERS
              value: "kafka:19093"
            - name: SLINK_KAFKA_TOPIC
              value: "slink.click_events"
            # Day 21 调到 500ms：100ms 在 docker network 高 RPS 下大量 send timeout（Day 20-21 复盘）
            - name: SLINK_KAFKA_SEND_TIMEOUT
              value: "500ms"
            - name: SLINK_KAFKA_MAX_BUFFERED
              value: "200000"
            - name: SLINK_KAFKA_DELIVERY_TIMEOUT
              value: "5s"

            # ── ClickHouse ──（host :19000）
            - name: SLINK_CH_ADDR
              value: "clickhouse:19000"
            - name: SLINK_CH_USER
              value: "slink"

            # ── OTel (v0.6 Phase 4.1) ──（K8s 内 collector ClusterIP）
            # 空值 = 禁用 OTel（noop tracer 不影响主路径）
            - name: SLINK_OTEL_ENDPOINT
              value: "otel-collector:4317"

          # readiness：K8s 摘流靠这个；Phase 2 优雅停机时 SIGTERM 后让 /healthz 主动 503
          readinessProbe:
            httpGet:
              path: /healthz
              port: 18080
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          # liveness：进程死透才重启；不能太敏感（Kafka flush 可能持续 25s）
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5

          # 资源 request/limit 起步保守，wrk 实测后再调
          resources:
            requests:
              cpu: "500m"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "512Mi"

          # Day 27 §8.3 S1-S4 优雅停机：全部在 Go 进程内（cmd/server/main.go SIGTERM handler）。
          # distroless 无 /bin/sh，无法 exec shell preStop；改为：
          #   1. SIGTERM → shutdownSig.MarkShuttingDown()（readiness 立即返 503，S1）
          #   2. time.Sleep(preStopDrain=5s)（等 K8s 摘流，S2）
          #   3. fasthttp.ShutdownWithContext()（drain in-flight，S3）
          #   4. kafkaProducer.Close()（flush 在飞 record，S4）
          # 总 budget ≤ 15s（5s drain + 10s shutdownGrace）< terminationGracePeriodSeconds=30s
