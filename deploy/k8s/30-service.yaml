apiVersion: v1
kind: Service
metadata:
  name: slink-server
  namespace: slink
  labels:
    app: slink-server
spec:
  # NodePort：host:18080 → kind node:30080 → Pod:18080
  # 绕过 kubectl port-forward 单 TCP 通道瓶颈
  type: NodePort
  selector:
    app: slink-server
  ports:
    - name: http
      port: 18080
      targetPort: 18080
      nodePort: 30080
      protocol: TCP
    - name: pprof
      port: 6060
      targetPort: 6060
      nodePort: 30060
      protocol: TCP
