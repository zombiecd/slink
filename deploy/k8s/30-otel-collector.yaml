# OTel Collector (v0.6 Phase 4.1)
#
# 部署形式：独立 Deployment（非 sidecar）
# 决策依据：bench/day-30-phase4-spike.md 拍板（kind 单节点 sidecar 浪费资源）
#
# 数据流：
#   slink-server Pod → otel-collector :4317 (OTLP gRPC)
#   slink-consumer Pod → otel-collector :4317
#       ↓
#   otel-collector → host.docker.internal:14317 (Jaeger backend)
#       ↓
#   Jaeger UI :16686 (host docker compose)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: slink
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 256
        spike_limit_mib: 64

    exporters:
      otlp/jaeger:
        # K8s ExternalName 路由到 host docker compose Jaeger（OTLP gRPC 端口 14317）
        endpoint: host.docker.internal:14317
        tls:
          insecure: true
      debug:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger, debug]
      telemetry:
        logs:
          level: info
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: slink
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.116.1
          args:
            - "--config=/etc/otelcol/config.yaml"
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: slink
spec:
  type: ClusterIP
  selector:
    app: otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
